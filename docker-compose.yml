version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gestor_citas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build: ./apps/backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/gestor_citas
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    env_file:
      - ./apps/backend/.env

  frontend:
    build: ./apps/frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api
    depends_on:
      - backend

volumes:
  postgres_data:
