name: Deploy — Production

on:
  push:
    branches:
      - main
  # Also trigger on release tags
  push:
    tags:
      - 'release-*'

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel a running production deploy

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production    # requires manual approval in GitHub environment settings
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build
        working-directory: apps/backend

      - name: Build frontend
        run: npm run build
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PROD_API_URL }}

      - name: Run migrations (Production)
        run: npx prisma migrate deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      # ── Replace with your actual deployment step ──────────────────────────
      - name: Deploy backend to Production
        run: echo "Deploy backend → Production"
        env:
          DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}

      - name: Deploy frontend to Production
        run: echo "Deploy frontend → Production"
        env:
          DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}

      - name: Notify deployment
        if: always()
        run: |
          echo "Production deployment ${{ job.status }} — ${{ github.ref }}"
          # Add Slack/PagerDuty/email notification here
