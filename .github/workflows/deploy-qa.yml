name: Deploy — QA

on:
  push:
    branches:
      - qa

concurrency:
  group: deploy-qa
  cancel-in-progress: false

jobs:
  deploy-qa:
    name: Deploy to QA (Railway)
    runs-on: ubuntu-latest
    environment: qa
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to QA
        continue-on-error: true
        run: railway redeploy --service Citas-Backend-QA --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend to QA
        continue-on-error: true
        run: railway redeploy --service Citas-Frontend-QA --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notify deployment
        if: always()
        run: |
          echo "QA deployment ${{ job.status }} — commit ${{ github.sha }}"
          echo "Backend QA: https://citas-backend-qa.up.railway.app"
          echo "Frontend QA: https://citas-frontend-qa.up.railway.app"
