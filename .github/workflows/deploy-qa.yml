name: Deploy — QA

on:
  push:
    branches:
      - qa

concurrency:
  group: deploy-qa
  cancel-in-progress: false   # nunca cancelar un deploy de QA en curso

jobs:
  deploy-qa:
    name: Deploy to QA (Railway)
    runs-on: ubuntu-latest
    environment: qa
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build
        working-directory: apps/backend

      - name: Build frontend
        run: npm run build
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.QA_BACKEND_URL }}/api

      - name: Run migrations (QA)
        run: npx prisma migrate deploy
        working-directory: apps/backend
        env:
          DATABASE_URL: ${{ secrets.QA_DATABASE_URL }}

      - name: Deploy backend to QA
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.QA_BACKEND_DEPLOY_HOOK }}"
          echo "Backend deploy hook triggered"

      - name: Deploy frontend to QA
        continue-on-error: true
        run: |
          curl -s -X POST "${{ secrets.QA_FRONTEND_DEPLOY_HOOK }}"
          echo "Frontend deploy hook triggered"

      - name: Notify deployment
        if: always()
        run: |
          echo "QA deployment ${{ job.status }} — commit ${{ github.sha }}"
          echo "Backend QA: ${{ secrets.QA_BACKEND_URL }}"
          echo "Frontend QA: ${{ secrets.QA_FRONTEND_URL }}"
